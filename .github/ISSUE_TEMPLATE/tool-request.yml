name: 💡 Tool request
description: Propose a new MCP tool. Talk through the shape first in Discussions if you're not sure, then file here.
labels: ["tool-request", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Most tools that ship come from a real question someone tried to ask Claude or ChatGPT and couldn't answer. Tell us the question first; we'll figure out the tool together.

        For early-stage discussion, [Discussions → Ideas](https://github.com/niyamvora/shinobidata/discussions/categories/ideas).

  - type: textarea
    id: question
    attributes:
      label: What user-facing question should this tool help answer?
      description: Phrase it as a real question someone would ask. Don't propose the tool name yet, just the question.
      placeholder: |
        "Of my holdings, which ones have insider buying in the last quarter?"
        "What's the historical correlation between my portfolio and gold?"
    validations:
      required: true

  - type: textarea
    id: data
    attributes:
      label: Data sources it would need
      description: Rough is fine. "Insider transactions", "options chain", "ETF holdings overlap" is enough.
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Single-company (input is one ticker)
        - Multi-company (input is N tickers, capped at ~5-10)
        - Portfolio-level (input is a portfolio id)
        - Universe / sector / industry (no specific symbol)
        - Discovery (cursor-paginated, screen-style)
    validations:
      required: true

  - type: dropdown
    id: shape
    attributes:
      label: Response shape
      description: |
        See [why analytics tools don't paginate](../docs/architecture.md#why-analytics-tools-dont-paginate). Analytics tools return constant-size summaries; listing tools cursor-paginate at 50/page.
      options:
        - Constant-size summary (server aggregates, no row dump)
        - Per-symbol detail (one row per holding, sorted)
        - Cursor-paginated list (50/page)
        - One-row detail (single ticker)
    validations:
      required: true

  - type: textarea
    id: example-response
    attributes:
      label: Example response (rough JSON sketch)
      description: Optional but helpful. Field names don't have to be final, we'll iterate.
      render: json

  - type: dropdown
    id: scope-needed
    attributes:
      label: OAuth scope this would need
      options:
        - market:read (public market data only)
        - portfolio:read (reads user's portfolios)
        - portfolio:write (mutates portfolios)
    validations:
      required: true
