name: 🐛 Bug report
description: OAuth, a tool's response, the consent screen, anything broken.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. The fields below are what we actually use to reproduce. Fill in what you can.

        For install / "how do I" questions, use [Discussions → Q&A](https://github.com/niyamvora/shinobidata/discussions/categories/q-a).

  - type: dropdown
    id: client
    attributes:
      label: AI client
      options:
        - Claude Desktop
        - claude.ai (web)
        - ChatGPT (Plus / Teams / Enterprise)
        - Custom MCP client (specify in description)
        - Other
      default: 0
    validations:
      required: true

  - type: input
    id: client-version
    attributes:
      label: AI client version
      description: Claude Desktop 0.10.x, ChatGPT (latest), or a release date.
      placeholder: "Claude Desktop 0.10.5"

  - type: textarea
    id: prompt
    attributes:
      label: What you asked the AI
      description: The actual prompt. If it's part of a longer conversation, just the one that triggered the bug.
      placeholder: '"Show me my portfolio overview for portfolio 2"'
      render: text
    validations:
      required: true

  - type: input
    id: tool
    attributes:
      label: Tool that failed
      description: If you saw which tool the AI called, name it. Otherwise leave blank.
      placeholder: "get_portfolio_overview"

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: Briefly. What was the right answer?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What you got
      description: Wrong answer, error message, hung request. Paste verbatim if possible.
      render: text
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs (if you have them)
      description: |
        For OAuth issues, contents of `~/.mcp-auth/` (with `access_token` / `refresh_token` redacted) help a lot.
        For Claude Desktop, Console.app entries from "Claude Helper".
      render: text

  - type: checkboxes
    id: search-confirm
    attributes:
      label: Confirm
      options:
        - label: Searched [Issues](https://github.com/niyamvora/shinobidata/issues?q=is%3Aissue) and [Discussions](https://github.com/niyamvora/shinobidata/discussions); not a duplicate.
          required: true
        - label: Redacted any secrets (OAuth tokens, API keys) from the fields above.
          required: true
